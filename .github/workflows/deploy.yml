name: Deploy Product Docs

on:
  push:
    branches: [astro]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Clone the parent landing-page repo (which has the pnpm workspace
      # and the chat-widget package that product-docs depends on).
      # product-docs is a submodule inside it — checkout recursively.
      - name: Checkout landing-page with submodules
        uses: actions/checkout@v3
        with:
          repository: future-agi/landing-page
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      # The submodule may point to an older commit of product-docs.
      # Pull the latest from the branch that triggered this workflow.
      - name: Update product-docs to current commit
        run: |
          cd product-docs
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.production for build
        working-directory: product-docs
        run: |
          cat <<EOF > .env.production
          PUBLIC_DOCS_AGENT_URL=${{ secrets.PUBLIC_DOCS_AGENT_URL }}
          PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
          EOF

      - name: Build product docs
        working-directory: product-docs
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          aws s3 sync product-docs/dist/ s3://${{ secrets.DOCS_S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DOCS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
