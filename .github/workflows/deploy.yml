name: Deploy Product Docs

on:
  push:
    branches: [astro]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Clone parent landing-page repo which has the pnpm workspace
      # and @futureagi/chat-widget that product-docs depends on.
      - name: Clone landing-page workspace
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.GH_PAT }}@github.com/future-agi/landing-page.git .

      # Replace the submodule with the actual commit that triggered this build.
      # Remove .git so pnpm sees it as a workspace member, not a standalone repo.
      - name: Checkout product-docs at trigger commit
        run: |
          rm -rf product-docs
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://x-access-token:${{ secrets.GH_PAT }}@github.com/future-agi/docs.git product-docs
          cd product-docs && git checkout ${{ github.sha }}
          rm -rf .git

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Use hoisted node_modules so product-docs can resolve all its deps
      - name: Configure pnpm for hoisted install
        run: echo "node-linker=hoisted" > .npmrc

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-hoisted-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-hoisted-

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      # Ensure product-docs can resolve all deps via root node_modules.
      # Vite's SSR resolver doesn't always traverse up from a nested node_modules.
      - name: Link node_modules for product-docs
        run: |
          rm -rf product-docs/node_modules
          ln -s "$(pwd)/node_modules" product-docs/node_modules

      - name: Create .env.production for build
        working-directory: product-docs
        run: |
          printf '%s\n' \
            "PUBLIC_DOCS_AGENT_URL=${{ secrets.PUBLIC_DOCS_AGENT_URL }}" \
            "PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}" \
            > .env.production

      - name: Build product docs
        working-directory: product-docs
        run: npx astro build && npx pagefind --site dist
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          aws s3 sync product-docs/dist/ s3://${{ secrets.DOCS_S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DOCS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
